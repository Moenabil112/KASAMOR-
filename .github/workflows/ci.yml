name: KASAMOR CI

# CI foundation for the KASAMOR MVP. Enforces the data-governance guarantees
# (coordinate redaction, coordinate-free public HTML) and verifies the Python
# services and both Next.js apps build.
#
# Note: regenerated knowledge artifacts (data/extracted-knowledge/*) are
# gitignored, so a fresh checkout has no knowledge_chunks.jsonl. The safety
# validator runs a redaction self-test in that case, so the coordinate guarantee
# is enforced by construction without committing the corpus.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python-validation:
    name: Python validation + safety + mock pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API/service requirements
        run: pip install -r services/api/requirements.txt

      - name: Coordinate-safety validation
        run: python scripts/validate_safety.py

      - name: API import/startup validation
        run: python scripts/validate_api.py

      - name: Mock agent pipeline (end-to-end)
        run: python scripts/run_mock_agent_pipeline.py

      - name: Verify Field Packet report was generated
        run: test -f data/outputs/reports/KSM-FP-0001_report.md

  public-interface:
    name: Public interface build + served-HTML safety scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/public-interface/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/public-interface
        run: npm ci

      - name: Build
        working-directory: apps/public-interface
        run: npm run build

      - name: Start server and run public served-HTML safety scan
        working-directory: apps/public-interface
        run: |
          npm run start &
          SERVER_PID=$!
          echo "started public-interface (pid $SERVER_PID)"
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:3000/; then
              echo "server ready after ${i}s"; break
            fi
            sleep 1
          done
          python3 ../../scripts/scan_public_html.py http://localhost:3000
          STATUS=$?
          kill "$SERVER_PID" 2>/dev/null || true
          exit $STATUS

  internal-console:
    name: Internal console build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/internal-console/package-lock.json

      - name: Install dependencies
        working-directory: apps/internal-console
        run: npm ci

      - name: Build
        working-directory: apps/internal-console
        run: npm run build
